identity:
  name: search_events
  author: shaba
  label:
    en_US: Search events
description:
  human:
    en_US: Search events in a calendar by text within an optional time range
  llm: Search calendar events (VEVENT) in a CalDAV calendar whose summary, description or location contains a text query, optionally limited to a start/end time range. Use to find a meeting or appointment by keyword.
parameters:
  - name: calendar
    type: string
    required: true
    label:
      en_US: Calendar
    human_description:
      en_US: Calendar display name or URL (see list_calendars)
    llm_description: The calendar to search, given as its display name or full URL as returned by list_calendars
    form: llm
  - name: query
    type: string
    required: true
    label:
      en_US: Query
    human_description:
      en_US: Text to match in event summary, description or location
    llm_description: Free text matched case-insensitively against the event summary, description and location
    form: llm
  - name: start
    type: string
    required: false
    label:
      en_US: Start time
    human_description:
      en_US: Lower bound, e.g. 2026-01-01 or 2026-01-01T00:00:00+03:00. A datetime without an explicit timezone/offset is treated as UTC.
    llm_description: Only search events at or after this date/time. A datetime without an explicit timezone offset is interpreted as UTC, so pass an offset (e.g. 2026-01-01T00:00:00+03:00) to avoid a shift. Optional.
    form: llm
  - name: end
    type: string
    required: false
    label:
      en_US: End time
    human_description:
      en_US: Upper bound, e.g. 2026-01-31 or 2026-01-31T23:59:00+03:00. A datetime without an explicit timezone/offset is treated as UTC.
    llm_description: Only search events before this date/time. A datetime without an explicit timezone offset is interpreted as UTC, so pass an offset (e.g. 2026-01-31T23:59:00+03:00) to avoid a shift. Optional.
    form: llm
extra:
  python:
    source: tools/search_events.py
